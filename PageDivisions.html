<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <?!= include('Styles') ?>
  <?!= include('Scripts') ?>
</head>
<body>
  <div id="nav-container"></div>

  <div class="main">
    <div id="content" class="loading">Loading division data...</div>
  </div>

  <script>
    /*
     * SECURITY NOTE: All dynamic values rendered in this page come from
     * trusted Google Apps Script server-side functions (getDivisionData).
     * All user-visible string values are escaped via escapeHtml() before
     * insertion into the DOM. The renderNav() function returns a static
     * trusted HTML template with no user-controlled content.
     *
     * innerHTML is used here because Google Apps Script HtmlService does not
     * support modern frameworks or DOM diffing libraries. The escapeHtml()
     * utility (defined in Scripts.html) uses the browser's own textContent
     * mechanism to safely encode special characters before insertion.
     */

    // Render navigation - renderNav returns static trusted template HTML
    document.getElementById('nav-container').innerHTML = renderNav('divisions');

    var divisionData = null;
    var charts = {};
    var activeTab = 'compare';

    google.script.run
      .withSuccessHandler(initializePage)
      .withFailureHandler(showError)
      .getDivisionData();

    function initializePage(data) {
      divisionData = data;
      renderPage();
    }

    function showError(error) {
      // Use safe DOM methods for error display (potentially untrusted message)
      var el = document.getElementById('content');
      el.textContent = '';
      var container = document.createElement('div');
      container.className = 'no-data';
      var h2 = document.createElement('h2');
      h2.textContent = 'Error Loading Data';
      var p = document.createElement('p');
      p.textContent = error.message;
      container.appendChild(h2);
      container.appendChild(p);
      el.appendChild(container);
    }

    function switchTab(tab) {
      activeTab = tab;
      renderPage();
    }

    function renderPage() {
      if (!divisionData || !divisionData.divisions) {
        document.getElementById('content').textContent = 'No division data available.';
        return;
      }

      var divNames = Object.keys(divisionData.divisions).sort();
      var parts = [];

      // Page title
      parts.push('<h1 class="page-title">Division Analytics</h1>');

      // Tabs - ARIA tab pattern with Basecoat styling via .sas-tabs
      parts.push('<div class="sas-tabs"><nav role="tablist" aria-orientation="horizontal">');
      parts.push('<button type="button" role="tab" aria-selected="' + (activeTab === 'compare') + '" onclick="switchTab(\'compare\')">Compare All</button>');
      divNames.forEach(function(name) {
        var tabId = name.replace(/\s+/g, '-').toLowerCase();
        parts.push('<button type="button" role="tab" aria-selected="' + (activeTab === tabId) + '" onclick="switchTab(\'' + tabId + '\')">' + escapeHtml(name) + '</button>');
      });
      parts.push('</nav></div>');

      if (activeTab === 'compare') {
        parts.push(renderCompareView(divNames));
      } else {
        var matchedDiv = divNames.find(function(name) {
          return name.replace(/\s+/g, '-').toLowerCase() === activeTab;
        });
        if (matchedDiv) {
          parts.push(renderDivisionView(matchedDiv, divisionData.divisions[matchedDiv]));
        } else {
          parts.push('<div class="no-data"><h2>Division not found</h2></div>');
        }
      }

      // All values in parts[] are either static HTML or escaped via escapeHtml()
      document.getElementById('content').innerHTML = parts.join('');
      setTimeout(function() {
        if (activeTab === 'compare') {
          createCompareCharts(divNames);
        } else {
          var matchedDiv = divNames.find(function(name) {
            return name.replace(/\s+/g, '-').toLowerCase() === activeTab;
          });
          if (matchedDiv) createDivisionCharts(matchedDiv, divisionData.divisions[matchedDiv]);
        }
      }, 50);
    }

    function divisionCssClass(name) {
      var map = {'Elementary School':'division-es','Middle School':'division-ms','High School':'division-hs'};
      return map[name] || 'division-admin';
    }

    function divisionColor(name) {
      return DIVISION_COLORS[name] || DIVISION_COLORS['Admin'];
    }

    /* ============================================
       COMPARE ALL VIEW
       ============================================ */
    function renderCompareView(divNames) {
      var parts = [];

      // Summary stat cards - all values are numeric or escaped strings from server
      parts.push('<div class="stats-grid">');
      divNames.forEach(function(name) {
        var d = divisionData.divisions[name];
        var cls = divisionCssClass(name);
        var adoptionRate = d.userCount > 0 ? Math.round((d.proCount / d.userCount) * 100) : 0;
        parts.push('<div class="stat-card ' + cls + '" style="cursor:pointer" onclick="switchTab(\'' + name.replace(/\s+/g, '-').toLowerCase() + '\')">');
        parts.push('<div class="stat-label">' + escapeHtml(name) + '</div>');
        parts.push('<div class="stat-value">' + parseInt(d.userCount) + ' <span style="font-size:14px;color:#888">users</span></div>');
        parts.push('<div class="stat-subtext">Pro: ' + parseInt(d.proCount) + ' (' + parseInt(adoptionRate) + '%) | Avg Days: ' + parseInt(d.avgActiveDays) + '</div>');
        parts.push('</div>');
      });
      parts.push('</div>');

      // Chart cards using Basecoat .card
      parts.push('<div class="charts-grid">');
      parts.push('<div class="card"><section><div class="chart-title">User Count by Division</div><div class="chart-wrapper"><canvas id="compareUsersChart"></canvas></div></section></div>');
      parts.push('<div class="card"><section><div class="chart-title">Gemini Pro Adoption Rate</div><div class="chart-wrapper"><canvas id="compareAdoptionChart"></canvas></div></section></div>');
      parts.push('</div>');

      parts.push('<div class="charts-grid">');
      parts.push('<div class="card"><section><div class="chart-title">Priority Distribution by Division</div><div class="chart-wrapper tall"><canvas id="comparePriorityChart"></canvas></div></section></div>');
      parts.push('<div class="card"><section><div class="chart-title">Average Active Days by Division</div><div class="chart-wrapper"><canvas id="compareActiveDaysChart"></canvas></div></section></div>');
      parts.push('</div>');

      // Summary table using Basecoat .card and .table
      parts.push('<div class="card"><header><h2>Division Summary</h2><button class="btn" onclick="exportDivisionCSV()">Export CSV</button></header>');
      parts.push('<section><div class="table-scroll"><table class="table"><thead><tr><th>Division</th><th>Users</th><th>Pro Users</th><th>Adoption Rate</th><th>Avg Active Days</th><th>High</th><th>Medium</th><th>Low</th><th>Zero</th></tr></thead><tbody>');
      divNames.forEach(function(name) {
        var d = divisionData.divisions[name];
        var rate = d.userCount > 0 ? Math.round((d.proCount / d.userCount) * 100) : 0;
        parts.push('<tr>');
        parts.push('<td><strong>' + escapeHtml(name) + '</strong></td>');
        parts.push('<td>' + parseInt(d.userCount) + '</td>');
        parts.push('<td>' + parseInt(d.proCount) + '</td>');
        parts.push('<td>' + parseInt(rate) + '%</td>');
        parts.push('<td>' + parseInt(d.avgActiveDays) + '</td>');
        parts.push('<td><span class="badge badge-high">' + parseInt(d.priorityBreakdown.High) + '</span></td>');
        parts.push('<td><span class="badge badge-medium">' + parseInt(d.priorityBreakdown.Medium) + '</span></td>');
        parts.push('<td><span class="badge badge-low">' + parseInt(d.priorityBreakdown.Low) + '</span></td>');
        parts.push('<td><span class="badge badge-zero">' + parseInt(d.priorityBreakdown.Zero) + '</span></td>');
        parts.push('</tr>');
      });
      parts.push('</tbody></table></div></section></div>');

      return parts.join('');
    }

    function createCompareCharts(divNames) {
      charts = destroyCharts(charts);
      var font = chartFontConfig();
      var labels = divNames.map(function(n) { return n; });
      var colors = divNames.map(divisionColor);

      // User count bar chart
      charts.compareUsers = new Chart(document.getElementById('compareUsersChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Total Users',
            data: divNames.map(function(n) { return divisionData.divisions[n].userCount; }),
            backgroundColor: colors
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { font: font } }, x: { ticks: { font: font } } }
        }
      });

      // Adoption rate stacked bar chart
      charts.compareAdoption = new Chart(document.getElementById('compareAdoptionChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Pro Users',
              data: divNames.map(function(n) { return divisionData.divisions[n].proCount; }),
              backgroundColor: CHART_COLORS.purple
            },
            {
              label: 'Basic Users',
              data: divNames.map(function(n) { var d = divisionData.divisions[n]; return d.userCount - d.proCount; }),
              backgroundColor: CHART_COLORS.gray
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: font } } },
          scales: {
            y: { beginAtZero: true, stacked: true, ticks: { font: font } },
            x: { stacked: true, ticks: { font: font } }
          }
        }
      });

      // Priority distribution grouped bar chart
      var priorityColors = { High: CHART_COLORS.red, Medium: CHART_COLORS.orange, Low: CHART_COLORS.yellow, Zero: CHART_COLORS.green };
      charts.comparePriority = new Chart(document.getElementById('comparePriorityChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: ['High', 'Medium', 'Low', 'Zero'].map(function(p) {
            return {
              label: p,
              data: divNames.map(function(n) { return divisionData.divisions[n].priorityBreakdown[p]; }),
              backgroundColor: priorityColors[p]
            };
          })
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: font } } },
          scales: { y: { beginAtZero: true, ticks: { font: font } }, x: { ticks: { font: font } } }
        }
      });

      // Average active days bar chart
      charts.compareActiveDays = new Chart(document.getElementById('compareActiveDaysChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Avg Active Days',
            data: divNames.map(function(n) { return divisionData.divisions[n].avgActiveDays; }),
            backgroundColor: colors
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { font: font } }, x: { ticks: { font: font } } }
        }
      });
    }

    /* ============================================
       SINGLE DIVISION VIEW
       ============================================ */
    function renderDivisionView(name, div) {
      var parts = [];
      var adoptionRate = div.userCount > 0 ? Math.round((div.proCount / div.userCount) * 100) : 0;
      var cls = divisionCssClass(name);

      // Stat cards - all values are numeric from trusted server data
      parts.push('<div class="stats-grid">');
      parts.push('<div class="stat-card ' + cls + '"><div class="stat-label">Total Users</div><div class="stat-value">' + parseInt(div.userCount) + '</div></div>');
      parts.push('<div class="stat-card pro"><div class="stat-label">Gemini Pro</div><div class="stat-value">' + parseInt(div.proCount) + '</div><div class="stat-subtext">' + parseInt(adoptionRate) + '% adoption</div></div>');
      parts.push('<div class="stat-card basic"><div class="stat-label">Basic</div><div class="stat-value">' + parseInt(div.userCount - div.proCount) + '</div></div>');
      parts.push('<div class="stat-card usage"><div class="stat-label">Avg Active Days</div><div class="stat-value">' + parseInt(div.avgActiveDays) + '</div></div>');
      parts.push('</div>');

      // Priority breakdown cards
      parts.push('<div class="stats-grid">');
      ['High', 'Medium', 'Low', 'Zero'].forEach(function(p) {
        var count = parseInt(div.priorityBreakdown[p]) || 0;
        var pct = div.userCount > 0 ? Math.round((count / div.userCount) * 100) : 0;
        parts.push('<div class="stat-card ' + p.toLowerCase() + '"><div class="stat-label">' + escapeHtml(p) + ' Priority</div><div class="stat-value">' + count + '</div><div class="stat-subtext">' + parseInt(pct) + '% of division</div></div>');
      });
      parts.push('</div>');

      // Chart cards using Basecoat .card
      parts.push('<div class="charts-grid">');
      parts.push('<div class="card"><section><div class="chart-title">Priority Distribution</div><div class="chart-wrapper"><canvas id="divPriorityChart"></canvas></div></section></div>');
      parts.push('<div class="card"><section><div class="chart-title">License Breakdown</div><div class="chart-wrapper"><canvas id="divLicenseChart"></canvas></div></section></div>');
      parts.push('</div>');

      // Top users chart
      if (div.topUsers && div.topUsers.length > 0) {
        parts.push('<div class="charts-grid">');
        parts.push('<div class="card"><section><div class="chart-title">Top Users by Active Days</div><div class="chart-wrapper tall"><canvas id="divTopUsersChart"></canvas></div></section></div>');
        parts.push('</div>');
      }

      // User table
      parts.push(renderDivisionTable(name, div));

      return parts.join('');
    }

    function createDivisionCharts(name, div) {
      charts = destroyCharts(charts);
      var font = chartFontConfig();

      // Priority doughnut chart
      charts.divPriority = new Chart(document.getElementById('divPriorityChart'), {
        type: 'doughnut',
        data: {
          labels: ['High', 'Medium', 'Low', 'Zero'],
          datasets: [{
            data: [div.priorityBreakdown.High, div.priorityBreakdown.Medium, div.priorityBreakdown.Low, div.priorityBreakdown.Zero],
            backgroundColor: [CHART_COLORS.red, CHART_COLORS.orange, CHART_COLORS.yellow, CHART_COLORS.green],
            borderWidth: 2, borderColor: '#fff'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { font: font } },
            tooltip: { callbacks: { label: function(c) { return c.label + ': ' + c.parsed + ' (' + (div.userCount > 0 ? ((c.parsed / div.userCount) * 100).toFixed(1) : 0) + '%)'; } } }
          }
        }
      });

      // License doughnut chart
      charts.divLicense = new Chart(document.getElementById('divLicenseChart'), {
        type: 'doughnut',
        data: {
          labels: ['Gemini Pro', 'Basic'],
          datasets: [{
            data: [div.proCount, div.userCount - div.proCount],
            backgroundColor: [CHART_COLORS.purple, CHART_COLORS.gray],
            borderWidth: 2, borderColor: '#fff'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: font } } }
        }
      });

      // Top users horizontal bar chart
      var topCanvas = document.getElementById('divTopUsersChart');
      if (topCanvas && div.topUsers && div.topUsers.length > 0) {
        var topLabels = div.topUsers.map(function(u) {
          var n = String(u.email).split('@')[0];
          return u.hasGeminiPro ? n + ' *' : n;
        });
        charts.divTopUsers = new Chart(topCanvas, {
          type: 'bar',
          data: {
            labels: topLabels,
            datasets: [{
              label: 'Active Days',
              data: div.topUsers.map(function(u) { return parseInt(u.activeDays) || 0; }),
              backgroundColor: div.topUsers.map(function(u) { return u.hasGeminiPro ? CHART_COLORS.purple : CHART_COLORS.gray; })
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true, ticks: { font: font } }, y: { ticks: { font: { family: 'DM Sans', size: 11 } } } }
          }
        });
      }
    }

    // User table for a single division view - all values escaped via escapeHtml
    function renderDivisionTable(name, div) {
      if (!div.users || div.users.length === 0) return '<div class="no-data"><h2>No users in this division</h2></div>';

      var sorted = div.users.slice().sort(function(a, b) { return (parseInt(b.activeDays) || 0) - (parseInt(a.activeDays) || 0); });
      var parts = [];
      parts.push('<div class="card"><header><h2>' + escapeHtml(name) + ' Users (' + parseInt(div.users.length) + ')</h2>');
      parts.push('<button class="btn" onclick="exportDivisionUsersCSV(\'' + escapeHtml(name).replace(/'/g, "\\'") + '\')">Export CSV</button></header>');
      parts.push('<section><div class="table-scroll"><table class="table"><thead><tr><th>#</th><th>Name</th><th>Email</th><th>Job Title</th><th>License</th><th>Priority</th><th>Active Days</th></tr></thead><tbody>');

      sorted.forEach(function(user, i) {
        parts.push('<tr>');
        parts.push('<td>' + (i + 1) + '</td>');
        parts.push('<td>' + escapeHtml(String(user.name || '')) + '</td>');
        parts.push('<td><a class="email-link" href="?page=user&amp;email=' + encodeURIComponent(user.email) + '">' + escapeHtml(String(user.email || '')) + '</a></td>');
        parts.push('<td>' + escapeHtml(String(user.jobTitle || '')) + '</td>');
        parts.push('<td><span class="' + licenseBadgeClass(user.hasGeminiPro) + '">' + (user.hasGeminiPro ? 'Pro' : 'Basic') + '</span></td>');
        parts.push('<td><span class="' + priorityBadgeClass(user.priority) + '">' + escapeHtml(String(user.priority || 'Zero')) + '</span></td>');
        parts.push('<td>' + (parseInt(user.activeDays) || 0) + '</td>');
        parts.push('</tr>');
      });

      parts.push('</tbody></table></div></section></div>');
      return parts.join('');
    }

    /* ============================================
       CSV EXPORTS
       ============================================ */
    function exportDivisionCSV() {
      if (!divisionData || !divisionData.divisions) return;
      var rows = [];
      Object.keys(divisionData.divisions).forEach(function(name) {
        var d = divisionData.divisions[name];
        rows.push({
          division: name, userCount: d.userCount, proCount: d.proCount,
          adoptionRate: d.userCount > 0 ? Math.round((d.proCount / d.userCount) * 100) : 0,
          avgActiveDays: d.avgActiveDays,
          high: d.priorityBreakdown.High, medium: d.priorityBreakdown.Medium,
          low: d.priorityBreakdown.Low, zero: d.priorityBreakdown.Zero
        });
      });
      downloadCSV(rows, [
        {key: 'division', label: 'Division'}, {key: 'userCount', label: 'Users'},
        {key: 'proCount', label: 'Pro Users'}, {key: 'adoptionRate', label: 'Adoption Rate (%)'},
        {key: 'avgActiveDays', label: 'Avg Active Days'},
        {key: 'high', label: 'High'}, {key: 'medium', label: 'Medium'},
        {key: 'low', label: 'Low'}, {key: 'zero', label: 'Zero'}
      ], 'sas-division-summary.csv');
    }

    function exportDivisionUsersCSV(divisionName) {
      if (!divisionData || !divisionData.divisions[divisionName]) return;
      var users = divisionData.divisions[divisionName].users;
      downloadCSV(users, [
        {key: 'name', label: 'Name'}, {key: 'email', label: 'Email'},
        {key: 'jobTitle', label: 'Job Title'},
        {key: function(r) { return r.hasGeminiPro ? 'Pro' : 'Basic'; }, label: 'License'},
        {key: 'priority', label: 'Priority'}, {key: 'activeDays', label: 'Active Days'}
      ], 'sas-' + divisionName.toLowerCase().replace(/\s+/g, '-') + '-users.csv');
    }
  </script>
</body>
</html>
