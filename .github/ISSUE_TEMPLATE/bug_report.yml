name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Next.js dashboard (UI / charts)
        - API route (usage / students / divisions / user)
        - Authentication / login
        - Apps Script sync
        - Apps Script JSON API
        - Docker / deployment
        - CI / tooling
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, error messages, screenshots, console output — anything that helps.
