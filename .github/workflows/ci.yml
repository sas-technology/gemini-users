name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  root-format:
    name: Format check (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run markdownlint

  nextjs:
    name: Next.js — typecheck / lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs-app/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
        env:
          DASHBOARD_SECRET: ci-secret
          APPS_SCRIPT_URL: https://example.com
          APPS_SCRIPT_API_KEY: ci-key

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t sas-gemini-dashboard ./nextjs-app
