name: CI

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  # ── Level 1: Format + security gates ────────────────────────────────────
  format-root:
    name: Format · root
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run format:check
      - run: npm run markdownlint

  format-sveltekit:
    name: Format · sveltekit-app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sveltekit-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sveltekit-app/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run format:check

  # ── Level 2: Static analysis (requires clean formatting) ────────────────
  typecheck-sveltekit:
    name: Typecheck · sveltekit-app
    needs: [format-root, format-sveltekit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sveltekit-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sveltekit-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  lint-sveltekit:
    name: Lint · sveltekit-app
    needs: [format-root, format-sveltekit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sveltekit-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sveltekit-app/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Level 3: Tests (requires types to be valid) ──────────────────────────
  test-sveltekit:
    name: Test · sveltekit-app
    needs: [typecheck-sveltekit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sveltekit-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sveltekit-app/package-lock.json
      - run: npm ci
      - run: npm run test:run

  # ── Level 4: Build (requires lint + tests to pass) ───────────────────────
  build-sveltekit:
    name: Build · sveltekit-app
    needs: [lint-sveltekit, test-sveltekit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sveltekit-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sveltekit-app/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          DASHBOARD_SECRET: ci-secret
          APPS_SCRIPT_URL: https://example.com
          APPS_SCRIPT_API_KEY: ci-key
          ORIGIN: http://localhost:3000

  # ── Level 5: Docker (requires successful build) ──────────────────────────
  docker-sveltekit:
    name: Docker · sveltekit-app
    needs: [build-sveltekit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: docker build -t sas-gemini-dashboard ./sveltekit-app
