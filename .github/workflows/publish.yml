name: Publish Docker Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish-sveltekit:
    name: Publish · sveltekit-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sveltekit-app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/sveltekit:latest
            ghcr.io/${{ github.repository }}/sveltekit:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-nextjs:
    name: Publish · nextjs-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./nextjs-app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nextjs:latest
            ghcr.io/${{ github.repository }}/nextjs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
