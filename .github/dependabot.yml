version: 2
updates:
  # Root — Prettier, Husky, markdownlint
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # SvelteKit dashboard
  - package-ecosystem: npm
    directory: /sveltekit-app
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Singapore
    open-pull-requests-limit: 10
    groups:
      svelte-ecosystem:
        patterns:
          - 'svelte'
          - '@sveltejs/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint*'
          - '@typescript-eslint*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest*'
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Singapore
    labels:
      - dependencies
      - ci
