<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage Analytics Dashboard - SAS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      /* SAS Brand Colors */
      --sas-red: #a0192a;
      --sas-blue: #1a2d58;
      --sas-yellow: #fabc00;
      --sas-gray: #d8dadb;

      /* Division Colors */
      --elementary: #228ec2;
      --middle-school: #a0192a;
      --high-school: #1a2d58;
      --admin: #6d6f72;

      /* Secondary Colors for Charts */
      --chart-orange: #ee7103;
      --chart-coral: #e6413d;
      --chart-purple: #c42384;
      --chart-teal: #1284ad;
      --chart-green: #009754;
      --chart-cyan: #2db7be;
      --chart-gold: #fdc013;

      /* Usage Level Colors */
      --usage-high: #ff0000;
      --usage-medium: #ff9900;
      --usage-low: #ffcc00;
      --usage-zero: #28a745;

      /* Gemini Pro Colors */
      --gemini-pro: #c42384;
      --gemini-basic: #97999c;

      /* Semantic Colors */
      --primary: var(--sas-blue);
      --secondary: var(--sas-red);
      --accent: var(--sas-yellow);

      /* Typography */
      --font-primary: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-primary);
      background: linear-gradient(135deg, var(--sas-blue) 0%, var(--sas-red) 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--sas-blue) 0%, var(--sas-red) 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
      font-weight: 400;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
      background: #f8f9fa;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-left: 4px solid;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .stat-card.total { border-color: var(--sas-blue); }
    .stat-card.pro { border-color: var(--gemini-pro); }
    .stat-card.basic { border-color: var(--gemini-basic); }
    .stat-card.high { border-color: var(--usage-high); }
    .stat-card.medium { border-color: var(--usage-medium); }
    .stat-card.low { border-color: var(--usage-low); }
    .stat-card.zero { border-color: var(--usage-zero); }
    .stat-card.usage { border-color: var(--sas-yellow); }

    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #333;
    }

    .stat-subtext {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
    }

    .quick-filters {
      display: flex;
      gap: 10px;
      padding: 20px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .quick-filter-btn {
      padding: 10px 20px;
      border: 2px solid var(--sas-blue);
      background: white;
      color: var(--sas-blue);
      font-family: var(--font-primary);
      font-size: 14px;
      font-weight: 600;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quick-filter-btn:hover {
      background: var(--sas-blue);
      color: white;
    }

    .quick-filter-btn.active {
      background: var(--sas-blue);
      color: white;
      box-shadow: 0 2px 8px rgba(26, 45, 88, 0.3);
    }

    .quick-filter-btn[data-filter="pro"] {
      border-color: var(--gemini-pro);
      color: var(--gemini-pro);
    }

    .quick-filter-btn[data-filter="pro"]:hover,
    .quick-filter-btn[data-filter="pro"].active {
      background: var(--gemini-pro);
      color: white;
      border-color: var(--gemini-pro);
    }

    .quick-filter-btn[data-filter="basic"] {
      border-color: var(--gemini-basic);
      color: #555;
    }

    .quick-filter-btn[data-filter="basic"]:hover,
    .quick-filter-btn[data-filter="basic"].active {
      background: var(--gemini-basic);
      color: white;
      border-color: var(--gemini-basic);
    }

    .quick-filter-btn[data-filter="non-active-staff"] {
      border-color: var(--usage-zero);
      color: #006400;
    }

    .quick-filter-btn[data-filter="non-active-staff"]:hover,
    .quick-filter-btn[data-filter="non-active-staff"].active {
      background: var(--usage-zero);
      color: white;
      border-color: var(--usage-zero);
    }

    .quick-filter-btn[data-filter="students"] {
      border-color: var(--elementary);
      color: var(--elementary);
    }

    .quick-filter-btn[data-filter="students"]:hover,
    .quick-filter-btn[data-filter="students"].active {
      background: var(--elementary);
      color: white;
      border-color: var(--elementary);
    }

    .filters {
      padding: 20px 30px;
      background: white;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-group label {
      font-size: 11px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input {
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: var(--font-primary);
      background: white;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--sas-blue);
    }

    .charts-section {
      padding: 30px;
      background: white;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chart-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--sas-blue);
      text-align: center;
    }

    .chart-wrapper {
      position: relative;
      height: 300px;
    }

    .chart-wrapper.tall {
      height: 400px;
    }

    .table-container {
      padding: 30px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: var(--sas-blue);
      color: white;
    }

    th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:hover {
      background: #f8f9fa;
    }

    .usage-value {
      font-weight: 600;
      color: var(--sas-blue);
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.pro {
      background: var(--gemini-pro);
      color: white;
    }

    .badge.basic {
      background: var(--gemini-basic);
      color: white;
    }

    .badge.untracked {
      background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
      color: white;
      margin-left: 5px;
    }

    .loading {
      text-align: center;
      padding: 50px;
      font-size: 18px;
      color: #666;
    }

    .no-data {
      text-align: center;
      padding: 50px;
      color: #999;
      font-size: 16px;
    }

    @media (max-width: 1200px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        flex-direction: column;
        align-items: stretch;
      }

      .chart-wrapper {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Usage Analytics Dashboard</h1>
      <p>Active Users Analysis (Active Days ≥ 1) • Singapore American School</p>
    </div>

    <div class="quick-filters">
      <button class="quick-filter-btn active" data-filter="all" onclick="applyQuickFilter('all')">All Users</button>
      <button class="quick-filter-btn" data-filter="pro" onclick="applyQuickFilter('pro')">AI Pro Users</button>
      <button class="quick-filter-btn" data-filter="basic" onclick="applyQuickFilter('basic')">Basic Only Users</button>
      <button class="quick-filter-btn" data-filter="non-active-staff" onclick="applyQuickFilter('non-active-staff')">Non-Active Users (Staff)</button>
      <button class="quick-filter-btn" data-filter="students" onclick="applyQuickFilter('students')">Students with Gemini</button>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label>Filter by Service</label>
        <select id="serviceFilter" onchange="filterData()">
          <option value="all">All Services</option>
          <option value="Gmail">Gmail</option>
          <option value="Docs">Docs</option>
          <option value="Sheets">Sheets</option>
          <option value="Slides">Slides</option>
          <option value="Drive">Drive</option>
          <option value="Meet">Meet</option>
          <option value="Gemini">Gemini App</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Usage Priority</label>
        <select id="priorityFilter" onchange="filterData()">
          <option value="all">All Priority Levels</option>
          <option value="High">High Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="Low">Low Priority</option>
          <option value="Zero">Zero Priority</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Minimum Usage Level</label>
        <select id="usageFilter" onchange="filterData()">
          <option value="all">All Levels</option>
          <option value="low-and-above">Low & Above (excludes Zero)</option>
          <option value="medium-and-above">Medium & Above</option>
          <option value="high-only">High Only</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Search Email</label>
        <input type="text" id="searchBox" placeholder="Search by email..." oninput="filterData()">
      </div>
    </div>

    <div id="content" class="loading">
      Loading data...
    </div>
  </div>

  <script>
    let allData = [];
    let filteredData = [];
    let charts = {};

    // SAS Brand Colors for Charts
    const CHART_COLORS = {
      blue: '#1a2d58',
      red: '#a0192a',
      yellow: '#fabc00',
      elementary: '#228ec2',
      orange: '#ee7103',
      coral: '#e6413d',
      purple: '#c42384',
      teal: '#1284ad',
      green: '#009754',
      cyan: '#2db7be',
      gold: '#fdc013',
      gray: '#97999c'
    };

    let studentData = null;
    let untrackedUsersData = null;
    let studentsNoGeminiCount = 0;
    let currentQuickFilter = 'all';

    // Load usage data from server
    // This includes isStaff and isStudent flags for each user
    google.script.run
      .withSuccessHandler(initializeDashboard)
      .withFailureHandler(showError)
      .getUsageData();

    // Load student data from server (for stats cards)
    google.script.run
      .withSuccessHandler(function(data) {
        studentData = data;
        if (allData.length > 0) renderDashboard(); // Re-render when student data arrives
      })
      .withFailureHandler(function(error) {
        console.error('Failed to load student data:', error);
      })
      .getStudentData();

    function initializeDashboard(data) {
      // getUsageData() now returns {users, untrackedUsers, studentsNoGeminiCount}
      untrackedUsersData = data.untrackedUsers || null;
      studentsNoGeminiCount = data.studentsNoGeminiCount || 0;
      allData = data.users || [];
      filteredData = allData;
      renderDashboard();
    }

    function showError(error) {
      document.getElementById('content').innerHTML = `
        <div class="no-data">
          <h2>Error Loading Data</h2>
          <p>${error.message}</p>
        </div>
      `;
    }

    function filterData() {
      const serviceFilter = document.getElementById('serviceFilter').value;
      const priorityFilter = document.getElementById('priorityFilter').value;
      const usageFilter = document.getElementById('usageFilter').value;
      const searchTerm = document.getElementById('searchBox').value.toLowerCase();

      filteredData = allData.filter(user => {
        // Apply quick filter (user category)
        if (currentQuickFilter === 'pro') {
          // AI Pro Users: users in pro_user_list
          if (!user.hasGeminiPro) {
            return false;
          }
        }
        if (currentQuickFilter === 'basic') {
          // Basic Only Users: staff in staff_list but NOT in pro_user_list
          if (!user.isStaff || user.hasGeminiPro) {
            return false;
          }
        }
        if (currentQuickFilter === 'non-active-staff') {
          // Non-active staff: staff members (not students) with Zero priority or 0 active days
          const isNonActive = user.overallUsagePriority === 'Zero' || user.activeDays === 0;
          if (user.isStudent || !user.isStaff || !isNonActive) {
            return false;
          }
        }
        if (currentQuickFilter === 'students') {
          // Students with Gemini access
          if (!user.isStudent) {
            return false;
          }
        }

        // Priority filter (specific level)
        if (priorityFilter !== 'all') {
          if (user.overallUsagePriority !== priorityFilter) {
            return false;
          }
        }

        // Search filter
        if (searchTerm && !user.email.toLowerCase().includes(searchTerm)) {
          return false;
        }

        // Minimum usage level filter (by priority)
        if (usageFilter !== 'all') {
          const priority = user.overallUsagePriority;

          if (usageFilter === 'low-and-above') {
            // Exclude Zero, allow Low, Medium, High
            if (priority === 'Zero') {
              return false;
            }
          } else if (usageFilter === 'medium-and-above') {
            // Only Medium and High
            if (priority === 'Zero' || priority === 'Low') {
              return false;
            }
          } else if (usageFilter === 'high-only') {
            // Only High
            if (priority !== 'High') {
              return false;
            }
          }
        }

        // Service filter (must have some usage in that service)
        if (serviceFilter !== 'all') {
          const serviceValue = user.services[serviceFilter];
          if (!serviceValue || serviceValue === 0) {
            return false;
          }
        }

        return true;
      });

      renderDashboard();
    }

    function applyQuickFilter(filter) {
      currentQuickFilter = filter;

      // Update button states
      document.querySelectorAll('.quick-filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === filter) {
          btn.classList.add('active');
        }
      });

      // Reset dropdown filters when switching quick filters
      document.getElementById('serviceFilter').value = 'all';
      document.getElementById('priorityFilter').value = 'all';
      document.getElementById('usageFilter').value = 'all';
      document.getElementById('searchBox').value = '';

      filterData();
    }

    function renderDashboard() {
      if (filteredData.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="no-data">
            <h2>No Data Found</h2>
            <p>Try adjusting your filters</p>
          </div>
        `;
        return;
      }

      // Calculate statistics
      const stats = calculateStats(filteredData);

      document.getElementById('content').innerHTML = `
        ${renderStats(stats)}
        ${renderChartsSection()}
        ${renderTable(filteredData)}
      `;

      // Render charts after DOM is ready
      setTimeout(() => {
        createCharts(stats);
      }, 100);
    }

    function calculateStats(data) {
      const stats = {
        total: data.length,
        totalUsage: 0,
        avgUsage: 0,
        avgActiveDays: 0,
        priority: {
          High: { count: 0, pro: 0, basic: 0 },
          Medium: { count: 0, pro: 0, basic: 0 },
          Low: { count: 0, pro: 0, basic: 0 },
          Zero: { count: 0, pro: 0, basic: 0 }
        },
        geminiPro: {
          count: 0,
          totalUsage: 0,
          avgUsage: 0,
          geminiUsage: 0
        },
        basic: {
          count: 0,
          totalUsage: 0,
          avgUsage: 0,
          geminiUsage: 0
        },
        services: {
          Gmail: { total: 0, users: 0, pro: 0, basic: 0 },
          Docs: { total: 0, users: 0, pro: 0, basic: 0 },
          Sheets: { total: 0, users: 0, pro: 0, basic: 0 },
          Slides: { total: 0, users: 0, pro: 0, basic: 0 },
          Drive: { total: 0, users: 0, pro: 0, basic: 0 },
          Meet: { total: 0, users: 0, pro: 0, basic: 0 },
          Gemini: { total: 0, users: 0, pro: 0, basic: 0 }
        },
        topUsers: []
      };

      let totalActiveDays = 0;

      data.forEach(user => {
        // Overall usage stats
        const usage = parseInt(user.overallUsage) || 0;
        stats.totalUsage += usage;
        totalActiveDays += user.activeDays;

        // Priority level stats
        const priority = user.overallUsagePriority || 'Zero';
        if (stats.priority[priority]) {
          stats.priority[priority].count++;
          if (user.hasGeminiPro) {
            stats.priority[priority].pro++;
          } else {
            stats.priority[priority].basic++;
          }
        }

        // Gemini Pro vs Basic stats
        const geminiUsage = parseInt(user.services.Gemini) || 0;
        if (user.hasGeminiPro) {
          stats.geminiPro.count++;
          stats.geminiPro.totalUsage += usage;
          stats.geminiPro.geminiUsage += geminiUsage;
        } else {
          stats.basic.count++;
          stats.basic.totalUsage += usage;
          stats.basic.geminiUsage += geminiUsage;
        }

        // Service-specific stats
        Object.keys(user.services).forEach(service => {
          const value = parseInt(user.services[service]) || 0;
          if (stats.services[service]) {
            stats.services[service].total += value;
            if (value > 0) {
              stats.services[service].users++;
              if (user.hasGeminiPro) {
                stats.services[service].pro++;
              } else {
                stats.services[service].basic++;
              }
            }
          }
        });
      });

      stats.avgUsage = stats.total > 0 ? Math.round(stats.totalUsage / stats.total) : 0;
      stats.avgActiveDays = stats.total > 0 ? Math.round(totalActiveDays / stats.total) : 0;
      stats.geminiPro.avgUsage = stats.geminiPro.count > 0 ? Math.round(stats.geminiPro.totalUsage / stats.geminiPro.count) : 0;
      stats.basic.avgUsage = stats.basic.count > 0 ? Math.round(stats.basic.totalUsage / stats.basic.count) : 0;

      // Get top 10 users by usage
      stats.topUsers = [...data]
        .sort((a, b) => (parseInt(b.overallUsage) || 0) - (parseInt(a.overallUsage) || 0))
        .slice(0, 10);

      return stats;
    }

    function renderStats(stats) {
      return `
        <div class="stats-grid">
          <div class="stat-card total">
            <div class="stat-label">Total Active Users</div>
            <div class="stat-value">${stats.total}</div>
          </div>
          <div class="stat-card pro">
            <div class="stat-label">Gemini Pro Users</div>
            <div class="stat-value">${stats.geminiPro.count}</div>
            <div class="stat-subtext">Avg: ${stats.geminiPro.avgUsage.toLocaleString()}</div>
          </div>
          <div class="stat-card basic">
            <div class="stat-label">Basic/No Pro Users</div>
            <div class="stat-value">${stats.basic.count}</div>
            <div class="stat-subtext">Avg: ${stats.basic.avgUsage.toLocaleString()}</div>
          </div>
          <div class="stat-card high">
            <div class="stat-label">High Priority Users</div>
            <div class="stat-value">${stats.priority.High.count}</div>
            <div class="stat-subtext">Pro: ${stats.priority.High.pro} | Basic: ${stats.priority.High.basic}</div>
          </div>
          <div class="stat-card medium">
            <div class="stat-label">Medium Priority Users</div>
            <div class="stat-value">${stats.priority.Medium.count}</div>
            <div class="stat-subtext">Pro: ${stats.priority.Medium.pro} | Basic: ${stats.priority.Medium.basic}</div>
          </div>
          <div class="stat-card low">
            <div class="stat-label">Low Priority Users</div>
            <div class="stat-value">${stats.priority.Low.count}</div>
            <div class="stat-subtext">Pro: ${stats.priority.Low.pro} | Basic: ${stats.priority.Low.basic}</div>
          </div>
          <div class="stat-card zero">
            <div class="stat-label">Zero Priority Users</div>
            <div class="stat-value">${stats.priority.Zero.count}</div>
            <div class="stat-subtext">Pro: ${stats.priority.Zero.pro} | Basic: ${stats.priority.Zero.basic}</div>
          </div>
          <div class="stat-card usage">
            <div class="stat-label">Total Usage</div>
            <div class="stat-value">${stats.totalUsage.toLocaleString()}</div>
          </div>
          ${studentData ? `
          <div class="stat-card total">
            <div class="stat-label">Students With Gemini Access</div>
            <div class="stat-value">${studentData.withAccess.total}</div>
          </div>
          ` : ''}
          ${studentsNoGeminiCount > 0 ? `
          <div class="stat-card" style="border-color: #6d6f72;">
            <div class="stat-label">Students Without Gemini</div>
            <div class="stat-value">${studentsNoGeminiCount}</div>
            <div class="stat-subtext">Excluded from all metrics</div>
          </div>
          ` : ''}
          ${untrackedUsersData ? `
          <div class="stat-card medium" style="background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); cursor: pointer;" onclick="showUntrackedUsers()" title="Click to view details">
            <div class="stat-label">⚠️ Untracked Users with Usage</div>
            <div class="stat-value">${untrackedUsersData.count}</div>
            <div class="stat-subtext">Users not in any known list but have usage > 0</div>
          </div>
          ` : ''}
        </div>
      `;
    }

    function renderChartsSection() {
      return `
        <div class="charts-section">
          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-title">Priority Distribution</div>
              <div class="chart-wrapper">

    function createCharts(stats) {
      // Destroy existing charts
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};

      // 1. Priority Distribution Doughnut Chart
      charts.priority = new Chart(document.getElementById('priorityChart'), {
        type: 'doughnut',
        data: {
          labels: ['High', 'Medium', 'Low', 'Zero'],
          datasets: [{
            data: [
              stats.priority.High.count,
              stats.priority.Medium.count,
              stats.priority.Low.count,
              stats.priority.Zero.count
            ],
            backgroundColor: [CHART_COLORS.red, CHART_COLORS.orange, CHART_COLORS.yellow, CHART_COLORS.green],
            borderWidth: 2,
            borderColor: '#fff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: {
                  family: 'DM Sans',
                  size: 13
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const label = context.label || '';
                  const value = context.parsed || 0;
                  const total = stats.total;
                  const percentage = ((value / total) * 100).toFixed(1);
                  return `${label}: ${value} users (${percentage}%)`;

      // 2. Priority Levels: Pro vs Basic Grouped Bar Chart

              backgroundColor: CHART_COLORS.purple,
              borderWidth: 1
            },
            {

              data: [
                stats.priority.High.basic,
                stats.priority.Medium.basic,
                stats.priority.Low.basic,
                stats.priority.Zero.basic

              backgroundColor: CHART_COLORS.gray,
              borderWidth: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: {
                  family: 'DM Sans',
                  size: 13
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                font: {
                  family: 'DM Sans'
                }
              }
            },
            x: {
              ticks: {
                font: {
                  family: 'DM Sans'
                }
              }
            }
          }
        }
      });

      // 3. Gemini Pro vs Basic License Distribution
      charts.license = new Chart(document.getElementById('licenseChart'), {
        type: 'doughnut',
        data: {
          labels: ['Gemini Pro', 'Basic/No Pro'],
          datasets: [{
            data: [stats.geminiPro.count, stats.basic.count],
            backgroundColor: [CHART_COLORS.purple, CHART_COLORS.gray],
            borderWidth: 2,
            borderColor: '#fff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: {
                  family: 'DM Sans',
                  size: 13
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const label = context.label || '';
                  const value = context.parsed || 0;
                  const total = stats.total;
                  const percentage = ((value / total) * 100).toFixed(1);
                  return `${label}: ${value} (${percentage}%)`;
                }
              }
            }
          }
        }
      });

      // 4. Gemini Usage Comparison
      charts.geminiUsage = new Chart(document.getElementById('geminiUsageChart'), {
        type: 'bar',
        data: {
          labels: ['Gemini Pro Users', 'Basic/No Pro Users'],
          datasets: [{
            label: 'Gemini App Usage',

            backgroundColor: [CHART_COLORS.purple, CHART_COLORS.gray],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `Usage: ${context.parsed.y.toLocaleString()}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                font: {
                  family: 'DM Sans'
                }
              }
            },
            x: {
              ticks: {
                font: {
                  family: 'DM Sans'
                }
              }
            }
          }
        }
      });

      // 5. Service Usage Pie Chart
      const serviceLabels = Object.keys(stats.services);
      const serviceData = serviceLabels.map(s => stats.services[s].total);
      const serviceColors = [
        CHART_COLORS.orange,    // Gmail
        CHART_COLORS.blue,      // Docs
        CHART_COLORS.green,     // Sheets
        CHART_COLORS.coral,     // Slides
        CHART_COLORS.teal,      // Drive
        CHART_COLORS.purple,    // Meet
        CHART_COLORS.gold       // Gemini

      charts.service = new Chart(document.getElementById('serviceChart'), {
        type: 'doughnut',
        data: {
          labels: serviceLabels,
          datasets: [{

            backgroundColor: serviceColors,

            borderColor: '#fff'

        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                font: {
                  family: 'DM Sans',
                  size: 12
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const label = context.label || '';
                  const value = context.parsed || 0;
                  return `${label}: ${value.toLocaleString()}`;
                }
              }
            }
          }
        }
      });

      // 6. Pro vs Basic by Service
      const proData = serviceLabels.map(s => stats.services[s].pro);
      const basicData = serviceLabels.map(s => stats.services[s].basic);

      charts.proBasic = new Chart(document.getElementById('proBasicChart'), {
        type: 'bar',
        data: {
          labels: serviceLabels,
          datasets: [

              label: 'Gemini Pro',

              backgroundColor: CHART_COLORS.purple,

            {

        options: {

          maintainAspectRatio: false,
          plugins: {

                  family: 'DM Sans'

          scales: {
            y: {
              beginAtZero: true,

              ticks: {

      // 7. Top 10 Users Horizontal Bar Chart
      const topUserLabels = stats.topUsers.map(u => {
        const username = u.email.split('@')[0];
        return u.hasGeminiPro ? `${username} ⭐` : username;
      });
      const topUserData = stats.topUsers.map(u => parseInt(u.overallUsage) || 0);
      const topUserColors = stats.topUsers.map(u => u.hasGeminiPro ? CHART_COLORS.purple : CHART_COLORS.gray);

      charts.topUsers = new Chart(document.getElementById('topUsersChart'), {

          datasets: [{

          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const user = stats.topUsers[context.dataIndex];
                  const license = user.hasGeminiPro ? 'Gemini Pro' : 'Basic/No Pro';
                  return [`Usage: ${context.parsed.x.toLocaleString()}`, `License: ${license}`];

          scales: {
            x: {
              beginAtZero: true,
              ticks: {
                font: {
                  family: 'DM Sans'
                }
              }
            },
            y: {
              ticks: {
                font: {
                  family: 'DM Sans',
                  size: 11
                }
              }
            }
          }
        }
      });

      // 8. Scatter Plot: Usage vs Active Days (colored by license)
      const proScatterData = filteredData
        .filter(u => u.hasGeminiPro)
        .map(u => ({ x: u.activeDays, y: parseInt(u.overallUsage) || 0 }));

      const basicScatterData = filteredData
        .filter(u => !u.hasGeminiPro)
        .map(u => ({ x: u.activeDays, y: parseInt(u.overallUsage) || 0 }));

      charts.scatter = new Chart(document.getElementById('scatterChart'), {
        type: 'scatter',
        data: {
          datasets: [
            {
              label: 'Gemini Pro',
              data: proScatterData,
              backgroundColor: CHART_COLORS.purple,
              borderColor: CHART_COLORS.purple,
              pointRadius: 6,
              pointHoverRadius: 8

            {
              label: 'Basic/No Pro',

              borderColor: CHART_COLORS.gray,

    function renderTable(data) {
      // Sort by overall usage descending
      const sortedData = [...data].sort((a, b) => {
        return (parseInt(b.overallUsage) || 0) - (parseInt(a.overallUsage) || 0);
      });

      let html = `
        <div class="table-container">
          <div class="chart-title">Detailed User Data (${data.length} users)</div>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>License</th>
                <th>Overall Usage</th>
                <th>Active Days</th>
                <th>Gmail</th>
                <th>Docs</th>
                <th>Sheets</th>
                <th>Slides</th>
                <th>Drive</th>
                <th>Meet</th>
                <th>Gemini</th>
              </tr>
            </thead>
            <tbody>
      `;

      // Build set of untracked emails for badge display
      const untrackedEmails = new Set();
      if (untrackedUsersData && untrackedUsersData.users) {
        untrackedUsersData.users.forEach(u => {
          untrackedEmails.add(u.email.toLowerCase());
        });
      }

      sortedData.forEach((user, index) => {
        const formatUsage = (priority, value) => {
          return `${priority} (${(parseInt(value) || 0).toLocaleString()})`;
        };

        // Check if this user is untracked
        const isUntracked = untrackedEmails.has(user.email.toLowerCase());

        html += `
          <tr>
            <td>${index + 1}</td>
            <td>${user.email}</td>
            <td>
              <span class="badge ${user.hasGeminiPro ? 'pro' : 'basic'}">${user.hasGeminiPro ? 'Pro' : 'Basic'}</span>
              ${isUntracked ? '<span class="badge untracked" title="Not in any known list">⚠️ Untracked</span>' : ''}
            </td>
            <td class="usage-value">${formatUsage(user.overallUsagePriority, user.overallUsage)}</td>
            <td>${user.activeDays}</td>
            <td>${formatUsage(user.servicesPriority.Gmail, user.services.Gmail)}</td>
            <td>${formatUsage(user.servicesPriority.Docs, user.services.Docs)}</td>
            <td>${formatUsage(user.servicesPriority.Sheets, user.services.Sheets)}</td>
            <td>${formatUsage(user.servicesPriority.Slides, user.services.Slides)}</td>
            <td>${formatUsage(user.servicesPriority.Drive, user.services.Drive)}</td>
            <td>${formatUsage(user.servicesPriority.Meet, user.services.Meet)}</td>
            <td>${formatUsage(user.servicesPriority.Gemini, user.services.Gemini)}</td>
          </tr>
        `;
      });

      html += '</tbody></table></div>';
      return html;
    }

    /**
     * Shows a detailed list of untracked users in an alert dialog.
     * These are users who have usage > 0 but aren't in any known list
     * (staff_list, pro_user_list, or student_gemini_access).
     */
    function showUntrackedUsers() {
      if (!untrackedUsersData || untrackedUsersData.count === 0) {
        alert('No untracked users found.');
        return;
      }

      // Sort by usage (highest first)
      const sortedUsers = [...untrackedUsersData.users].sort((a, b) => b.overallUsage - a.overallUsage);

      // Build message
      let message = `Untracked Users with Usage > 0: ${untrackedUsersData.count}\n\n`;
      message += 'These users have Gemini usage but are not in any known list:\n';
      message += '(staff_list, pro_user_list, or student_gemini_access)\n\n';
      message += '─'.repeat(70) + '\n\n';

      sortedUsers.forEach((user, index) => {
        message += `${index + 1}. ${user.email}\n`;
        message += `   Priority: ${user.priority}\n`;
        message += `   Overall Usage: ${user.overallUsage.toLocaleString()}\n`;
        message += `   Active Days: ${user.activeDays}\n\n`;
      });

      message += '─'.repeat(70) + '\n\n';
      message += 'Possible reasons:\n';
      message += '• Former employees or students still using accounts\n';
      message += '• Accounts created outside normal processes\n';
      message += '• Test or service accounts\n';
      message += '• Data synchronization issues\n\n';
      message += 'Action: Review these accounts and add them to appropriate lists or deactivate if necessary.';

      alert(message);
    }
