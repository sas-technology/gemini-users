<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <?!= include('Styles') ?>
  <?!= include('Scripts') ?>
</head>
<body>
  <div id="nav-container"></div>

  <div class="main">
    <div id="content" class="loading">Loading dashboard data...</div>
  </div>

  <script>
    // Render navigation safely - renderNav returns trusted template HTML only
    document.getElementById('nav-container').innerHTML = renderNav('overview');

    var allData = [];
    var filteredData = [];
    var charts = {};
    var studentData = null;
    var untrackedUsersData = null;
    var studentsNoGeminiCount = 0;
    var divisionSummary = null;
    var currentQuickFilter = 'all';

    // Load all data in parallel
    google.script.run
      .withSuccessHandler(initializeDashboard)
      .withFailureHandler(showError)
      .getUsageData();

    google.script.run
      .withSuccessHandler(function(data) {
        studentData = data;
        if (allData.length > 0) renderDashboard(); // Re-render when student data arrives
      })
      .withFailureHandler(function(err) { console.error('Student data error:', err); })
      .getStudentData();

    google.script.run
      .withSuccessHandler(function(data) {
        divisionSummary = data;
        if (allData.length > 0) renderDashboard();
      })
      .withFailureHandler(function(err) { console.error('Division data error:', err); })
      .getDivisionData();

    function initializeDashboard(data) {
      untrackedUsersData = data.untrackedUsers || null;
      studentsNoGeminiCount = data.studentsNoGeminiCount || 0;
      allData = data.users || [];
      filteredData = allData;
      renderDashboard();
    }

    function showError(error) {
      var el = document.getElementById('content');
      el.textContent = '';
      var container = document.createElement('div');
      container.className = 'no-data';
      var h2 = document.createElement('h2');
      h2.textContent = 'Error Loading Data';
      var p = document.createElement('p');
      p.textContent = error.message;
      container.appendChild(h2);
      container.appendChild(p);
      el.appendChild(container);
    }

    function filterData() {
      var serviceFilter = document.getElementById('serviceFilter').value;
      var priorityFilter = document.getElementById('priorityFilter').value;
      var usageFilter = document.getElementById('usageFilter').value;
      var searchTerm = document.getElementById('searchBox').value.toLowerCase();

      filteredData = allData.filter(function(user) {
        if (currentQuickFilter === 'pro' && !user.hasGeminiPro) return false;
        if (currentQuickFilter === 'basic' && (!user.isStaff || user.hasGeminiPro)) return false;
        if (currentQuickFilter === 'non-active-staff') {
          if (user.isStudent || !user.isStaff) return false;
          if (user.overallUsagePriority !== 'Zero' && user.activeDays !== 0) return false;
        }
        if (currentQuickFilter === 'students' && !user.isStudent) return false;
        if (priorityFilter !== 'all' && user.overallUsagePriority !== priorityFilter) return false;
        if (searchTerm && !user.email.toLowerCase().includes(searchTerm)) return false;
        if (usageFilter !== 'all') {
          var p = user.overallUsagePriority;
          if (usageFilter === 'low-and-above' && p === 'Zero') return false;
          if (usageFilter === 'medium-and-above' && (p === 'Zero' || p === 'Low')) return false;
          if (usageFilter === 'high-only' && p !== 'High') return false;
        }
        if (serviceFilter !== 'all') {
          if (!user.services[serviceFilter] || user.services[serviceFilter] === 0) return false;
        }
        return true;
      });
      renderDashboard();
    }

    function applyQuickFilter(filter) {
      currentQuickFilter = filter;
      document.querySelectorAll('.quick-filter-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      document.getElementById('serviceFilter').value = 'all';
      document.getElementById('priorityFilter').value = 'all';
      document.getElementById('usageFilter').value = 'all';
      document.getElementById('searchBox').value = '';
      filterData();
    }

    // All data rendered via innerHTML below is either from trusted server-side sources
    // or escaped via escapeHtml(). No raw user input is inserted unescaped.
    function renderDashboard() {
      if (filteredData.length === 0 && allData.length === 0) {
        document.getElementById('content').textContent = 'No data found. Try adjusting your filters.';
        return;
      }
      var stats = calculateStats(filteredData);
      var parts = [];

      // Stats grid
      parts.push('<div class="stats-grid">');
      parts.push(statCard('total', 'Total Users', stats.total, ''));
      parts.push(statCard('pro', 'Gemini Pro Users', stats.geminiPro.count, 'Avg: ' + stats.geminiPro.avgUsage.toLocaleString()));
      parts.push(statCard('basic', 'Basic/No Pro Users', stats.basic.count, 'Avg: ' + stats.basic.avgUsage.toLocaleString()));
      parts.push(statCard('high', 'High Priority', stats.priority.High.count, 'Pro: ' + stats.priority.High.pro + ' | Basic: ' + stats.priority.High.basic));
      parts.push(statCard('medium', 'Medium Priority', stats.priority.Medium.count, 'Pro: ' + stats.priority.Medium.pro + ' | Basic: ' + stats.priority.Medium.basic));
      parts.push(statCard('low', 'Low Priority', stats.priority.Low.count, 'Pro: ' + stats.priority.Low.pro + ' | Basic: ' + stats.priority.Low.basic));
      parts.push(statCard('zero', 'Zero Priority', stats.priority.Zero.count, 'Pro: ' + stats.priority.Zero.pro + ' | Basic: ' + stats.priority.Zero.basic));
      parts.push(statCard('usage', 'Total Usage', stats.totalUsage.toLocaleString(), 'Avg: ' + stats.avgUsage.toLocaleString()));
      if (studentData) parts.push(statCard('total', 'Students With Gemini', studentData.withAccess.total, ''));
      if (studentsNoGeminiCount > 0) parts.push(statCard('', 'Students Without Gemini', studentsNoGeminiCount, 'Excluded from metrics').replace('border-left: 4px solid;','border-left: 4px solid #6d6f72;'));
      if (untrackedUsersData && untrackedUsersData.count > 0) parts.push('<div class="stat-card" style="border-color:#ff9800;cursor:pointer" onclick="showUntrackedUsers()"><div class="stat-label">Untracked Users</div><div class="stat-value">' + untrackedUsersData.count + '</div><div class="stat-subtext">Not in any known list</div></div>');
      parts.push('</div>');

      // Division summary
      if (divisionSummary && divisionSummary.divisions) {
        parts.push('<div class="stats-grid">');
        var divColors = {'Elementary School':'division-es','Middle School':'division-ms','High School':'division-hs'};
        Object.keys(divisionSummary.divisions).forEach(function(name) {
          var d = divisionSummary.divisions[name];
          var cls = divColors[name] || 'division-admin';
          parts.push('<div class="stat-card ' + cls + '" style="cursor:pointer" onclick="goToPage(\'divisions\')"><div class="stat-label">' + escapeHtml(name) + '</div><div class="stat-value">' + d.userCount + '</div><div class="stat-subtext">Pro: ' + d.proCount + ' | Avg Days: ' + d.avgActiveDays + '</div></div>');
        });
        parts.push('</div>');
      }

      // Filters
      parts.push('<div class="filters-bar">');
      ['all','pro','basic','non-active-staff','students'].forEach(function(f) {
        var labels = {all:'All Users',pro:'AI Pro Users',basic:'Basic Only','non-active-staff':'Non-Active Staff',students:'Students'};
        parts.push('<button class="quick-filter-btn ' + (currentQuickFilter===f?'active':'') + '" data-filter="' + f + '" onclick="applyQuickFilter(\'' + f + '\')">' + labels[f] + '</button>');
      });
      parts.push('<div class="filter-separator"></div>');
      parts.push(filterSelect('serviceFilter','Service',[['all','All'],['Gmail','Gmail'],['Docs','Docs'],['Sheets','Sheets'],['Slides','Slides'],['Drive','Drive'],['Meet','Meet'],['Gemini','Gemini']]));
      parts.push(filterSelect('priorityFilter','Priority',[['all','All'],['High','High'],['Medium','Medium'],['Low','Low'],['Zero','Zero']]));
      parts.push(filterSelect('usageFilter','Min Level',[['all','All'],['low-and-above','Low+'],['medium-and-above','Med+'],['high-only','High']]));
      parts.push('<div class="filter-group"><label>Search</label><input type="text" class="search-input" id="searchBox" placeholder="Email..." oninput="filterData()"></div>');
      parts.push('</div>');

      // Charts
      parts.push('<div class="charts-grid">' + chartCard('priorityChart','Priority Distribution') + chartCard('priorityProBasicChart','Priority: Pro vs Basic') + '</div>');
      parts.push('<div class="charts-grid">' + chartCard('licenseChart','License Distribution') + chartCard('geminiUsageChart','Gemini Usage: Pro vs Basic') + '</div>');
      parts.push('<div class="charts-grid">' + chartCard('serviceChart','Service Usage') + chartCard('proBasicChart','Pro vs Basic by Service') + '</div>');
      parts.push('<div class="charts-grid"><div class="card"><section><div class="chart-title">Top 10 Users</div><div class="chart-wrapper tall"><canvas id="topUsersChart"></canvas></div></section></div>');
      parts.push('<div class="card"><section><div class="chart-title">Usage vs Active Days</div><div class="chart-wrapper tall"><canvas id="scatterChart"></canvas></div></section></div></div>');

      // Table
      parts.push(renderTable(filteredData));

      document.getElementById('content').innerHTML = parts.join('');
      setTimeout(function() { createCharts(stats); }, 50);
    }

    function statCard(cls, label, value, subtext) {
      return '<div class="stat-card ' + cls + '"><div class="stat-label">' + escapeHtml(label) + '</div><div class="stat-value">' + escapeHtml(String(value)) + '</div>' +
        (subtext ? '<div class="stat-subtext">' + escapeHtml(subtext) + '</div>' : '') + '</div>';
    }

    function chartCard(id, title) {
      return '<div class="card"><section><div class="chart-title">' + escapeHtml(title) + '</div><div class="chart-wrapper"><canvas id="' + id + '"></canvas></div></section></div>';
    }

    function filterSelect(id, label, options) {
      var h = '<div class="filter-group"><label>' + escapeHtml(label) + '</label><select id="' + id + '" onchange="filterData()">';
      options.forEach(function(o) { h += '<option value="' + escapeHtml(o[0]) + '">' + escapeHtml(o[1]) + '</option>'; });
      return h + '</select></div>';
    }

    function calculateStats(data) {
      var stats = {
        total: data.length, totalUsage: 0, avgUsage: 0,
        priority: { High:{count:0,pro:0,basic:0}, Medium:{count:0,pro:0,basic:0}, Low:{count:0,pro:0,basic:0}, Zero:{count:0,pro:0,basic:0} },
        geminiPro: { count:0, totalUsage:0, avgUsage:0, geminiUsage:0 },
        basic: { count:0, totalUsage:0, avgUsage:0, geminiUsage:0 },
        services: { Gmail:{total:0,users:0,pro:0,basic:0}, Docs:{total:0,users:0,pro:0,basic:0}, Sheets:{total:0,users:0,pro:0,basic:0}, Slides:{total:0,users:0,pro:0,basic:0}, Drive:{total:0,users:0,pro:0,basic:0}, Meet:{total:0,users:0,pro:0,basic:0}, Gemini:{total:0,users:0,pro:0,basic:0} },
        topUsers: []
      };
      data.forEach(function(user) {
        var usage = parseInt(user.overallUsage) || 0;
        stats.totalUsage += usage;
        var p = user.overallUsagePriority || 'Zero';
        if (stats.priority[p]) { stats.priority[p].count++; user.hasGeminiPro ? stats.priority[p].pro++ : stats.priority[p].basic++; }
        var gUsage = parseInt(user.services.Gemini) || 0;
        if (user.hasGeminiPro) { stats.geminiPro.count++; stats.geminiPro.totalUsage += usage; stats.geminiPro.geminiUsage += gUsage; }
        else { stats.basic.count++; stats.basic.totalUsage += usage; stats.basic.geminiUsage += gUsage; }
        Object.keys(user.services).forEach(function(svc) {
          var v = parseInt(user.services[svc]) || 0;
          if (stats.services[svc]) { stats.services[svc].total += v; if (v>0) { stats.services[svc].users++; user.hasGeminiPro ? stats.services[svc].pro++ : stats.services[svc].basic++; } }
        });
      });
      stats.avgUsage = stats.total > 0 ? Math.round(stats.totalUsage / stats.total) : 0;
      stats.geminiPro.avgUsage = stats.geminiPro.count > 0 ? Math.round(stats.geminiPro.totalUsage / stats.geminiPro.count) : 0;
      stats.basic.avgUsage = stats.basic.count > 0 ? Math.round(stats.basic.totalUsage / stats.basic.count) : 0;
      stats.topUsers = data.slice().sort(function(a,b){ return (parseInt(b.overallUsage)||0)-(parseInt(a.overallUsage)||0); }).slice(0,10);
      return stats;
    }

    function createCharts(stats) {
      charts = destroyCharts(charts);
      var font = chartFontConfig();
      charts.priority = new Chart(document.getElementById('priorityChart'), { type:'doughnut', data:{ labels:['High','Medium','Low','Zero'], datasets:[{data:[stats.priority.High.count,stats.priority.Medium.count,stats.priority.Low.count,stats.priority.Zero.count], backgroundColor:[CHART_COLORS.red,CHART_COLORS.orange,CHART_COLORS.yellow,CHART_COLORS.green], borderWidth:2, borderColor:'#fff'}] }, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:font}}, tooltip:{callbacks:{label:function(c){return c.label+': '+c.parsed+' ('+((c.parsed/stats.total)*100).toFixed(1)+'%)';}}}} } });
      charts.priorityProBasic = new Chart(document.getElementById('priorityProBasicChart'), { type:'bar', data:{ labels:['High','Medium','Low','Zero'], datasets:[{label:'Pro',data:[stats.priority.High.pro,stats.priority.Medium.pro,stats.priority.Low.pro,stats.priority.Zero.pro],backgroundColor:CHART_COLORS.purple},{label:'Basic',data:[stats.priority.High.basic,stats.priority.Medium.basic,stats.priority.Low.basic,stats.priority.Zero.basic],backgroundColor:CHART_COLORS.gray}] }, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:font}}}, scales:{y:{beginAtZero:true,ticks:{font:font}},x:{ticks:{font:font}}}} });
      charts.license = new Chart(document.getElementById('licenseChart'), { type:'doughnut', data:{labels:['Gemini Pro','Basic'],datasets:[{data:[stats.geminiPro.count,stats.basic.count],backgroundColor:[CHART_COLORS.purple,CHART_COLORS.gray],borderWidth:2,borderColor:'#fff'}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:font}}}} });
      charts.geminiUsage = new Chart(document.getElementById('geminiUsageChart'), { type:'bar', data:{labels:['Pro Users','Basic Users'],datasets:[{label:'Gemini Usage',data:[stats.geminiPro.geminiUsage,stats.basic.geminiUsage],backgroundColor:[CHART_COLORS.purple,CHART_COLORS.gray]}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{font:font}},x:{ticks:{font:font}}}} });
      var svcLabels = Object.keys(stats.services);
      charts.service = new Chart(document.getElementById('serviceChart'), { type:'doughnut', data:{labels:svcLabels,datasets:[{data:svcLabels.map(function(s){return stats.services[s].total;}),backgroundColor:SERVICE_COLORS,borderWidth:2,borderColor:'#fff'}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:12}}}}} });
      charts.proBasic = new Chart(document.getElementById('proBasicChart'), { type:'bar', data:{labels:svcLabels,datasets:[{label:'Pro',data:svcLabels.map(function(s){return stats.services[s].pro;}),backgroundColor:CHART_COLORS.purple},{label:'Basic',data:svcLabels.map(function(s){return stats.services[s].basic;}),backgroundColor:CHART_COLORS.gray}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:font}}},scales:{y:{beginAtZero:true,ticks:{font:font}},x:{ticks:{font:font}}}} });
      var topLabels = stats.topUsers.map(function(u){var n=u.email.split('@')[0];return u.hasGeminiPro?n+' *':n;});
      charts.topUsers = new Chart(document.getElementById('topUsersChart'), { type:'bar', data:{labels:topLabels,datasets:[{label:'Usage',data:stats.topUsers.map(function(u){return parseInt(u.overallUsage)||0;}),backgroundColor:stats.topUsers.map(function(u){return u.hasGeminiPro?CHART_COLORS.purple:CHART_COLORS.gray;})}]}, options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{font:font}},y:{ticks:{font:{family:'DM Sans',size:11}}}}} });
      charts.scatter = new Chart(document.getElementById('scatterChart'), { type:'scatter', data:{datasets:[{label:'Pro',data:filteredData.filter(function(u){return u.hasGeminiPro;}).map(function(u){return{x:u.activeDays,y:parseInt(u.overallUsage)||0};}),backgroundColor:CHART_COLORS.purple,borderColor:CHART_COLORS.purple,pointRadius:5,pointHoverRadius:7},{label:'Basic',data:filteredData.filter(function(u){return!u.hasGeminiPro;}).map(function(u){return{x:u.activeDays,y:parseInt(u.overallUsage)||0};}),backgroundColor:CHART_COLORS.gray,borderColor:CHART_COLORS.gray,pointRadius:4,pointHoverRadius:6}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:font}}},scales:{x:{title:{display:true,text:'Active Days',font:{family:'DM Sans',size:13,weight:'bold'}},ticks:{font:font}},y:{title:{display:true,text:'Overall Usage',font:{family:'DM Sans',size:13,weight:'bold'}},beginAtZero:true,ticks:{font:font}}}} });
    }

    function renderTable(data) {
      var sorted = data.slice().sort(function(a,b){return(parseInt(b.overallUsage)||0)-(parseInt(a.overallUsage)||0);});
      var untrackedEmails = {};
      if (untrackedUsersData && untrackedUsersData.users) untrackedUsersData.users.forEach(function(u){untrackedEmails[u.email.toLowerCase()]=true;});

      var parts = ['<div class="card"><header><h2>User Data (' + data.length + ' users)</h2><button class="btn" onclick="exportTableCSV()">Export CSV</button></header><section><div class="table-scroll"><table class="table"><thead><tr><th>#</th><th>Email</th><th>License</th><th>Priority</th><th>Active Days</th><th>Gmail</th><th>Docs</th><th>Sheets</th><th>Slides</th><th>Drive</th><th>Meet</th><th>Gemini</th></tr></thead><tbody>'];

      sorted.forEach(function(user, i) {
        var isUntracked = untrackedEmails[user.email.toLowerCase()];
        var row = '<tr><td>' + (i+1) + '</td>';
        row += '<td><a class="email-link" href="?page=user&amp;email=' + encodeURIComponent(user.email) + '">' + escapeHtml(user.email) + '</a></td>';
        row += '<td><span class="' + licenseBadgeClass(user.hasGeminiPro) + '">' + (user.hasGeminiPro?'Pro':'Basic') + '</span>';
        if (isUntracked) row += ' <span class="badge badge-untracked">Untracked</span>';
        row += '</td>';
        row += '<td><span class="' + priorityBadgeClass(user.overallUsagePriority) + '">' + escapeHtml(user.overallUsagePriority||'Zero') + '</span> <span class="usage-value">(' + ((parseInt(user.overallUsage)||0).toLocaleString()) + ')</span></td>';
        row += '<td>' + user.activeDays + '</td>';
        ['Gmail','Docs','Sheets','Slides','Drive','Meet','Gemini'].forEach(function(svc) { row += '<td>' + formatUsage(user.servicesPriority[svc], user.services[svc]) + '</td>'; });
        parts.push(row + '</tr>');
      });

      parts.push('</tbody></table></div></section></div>');
      return parts.join('');
    }

    function exportTableCSV() {
      var columns = [
        {key:'email',label:'Email'},{key:function(r){return r.hasGeminiPro?'Pro':'Basic';},label:'License'},
        {key:'overallUsagePriority',label:'Priority'},{key:'overallUsage',label:'Overall Usage'},{key:'activeDays',label:'Active Days'},
        {key:function(r){return r.services.Gmail;},label:'Gmail'},{key:function(r){return r.services.Docs;},label:'Docs'},
        {key:function(r){return r.services.Sheets;},label:'Sheets'},{key:function(r){return r.services.Slides;},label:'Slides'},
        {key:function(r){return r.services.Drive;},label:'Drive'},{key:function(r){return r.services.Meet;},label:'Meet'},
        {key:function(r){return r.services.Gemini;},label:'Gemini'}
      ];
      downloadCSV(filteredData, columns, 'sas-usage-analytics.csv');
    }

    function showUntrackedUsers() {
      if (!untrackedUsersData || untrackedUsersData.count === 0) { alert('No untracked users.'); return; }
      var sorted = untrackedUsersData.users.slice().sort(function(a,b){return b.overallUsage-a.overallUsage;});
      var msg = 'Untracked Users (' + untrackedUsersData.count + '):\n\n';
      sorted.forEach(function(u,i){msg += (i+1)+'. '+u.email+' - '+u.priority+' (Usage: '+u.overallUsage+', Days: '+u.activeDays+')\n';});
      alert(msg);
    }
  </script>
</body>
</html>
